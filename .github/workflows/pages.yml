name: Deploy static guide to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout committed static files
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload committed dist artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Wait for previous Pages deployment to settle
        run: sleep 60

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retrying Pages deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 90

      - name: Retry Deploy to GitHub Pages
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
